version: 1
defaults:
  base_url: "${TEAM_ENDPOINT}"
  auth:
    teamId: "${TEAM_ID}"
    teamSecret: "${TEAM_SECRET}"
    callerNodeId: "${NODE_ID}"

domains:
  team:
    description: "团队管理"
    actions:
      list-members:
        description: "列出团队所有成员及角色"
        method: POST
        path: /team/list-members
        params: {}

      list-applications:
        description: "查看待审批的加入申请"
        method: POST
        path: /team/list-applications
        params: {}

      approve-member:
        description: "批准成员加入申请"
        method: POST
        path: /team/approve-member
        params:
          nodeId: { type: string, required: true, description: "申请者的 Node ID" }
          name: { type: string, required: true, description: "申请者姓名" }
          role: { type: string, default: "editor", description: "分配角色: editor 或 viewer" }

      reject-member:
        description: "拒绝加入申请"
        method: POST
        path: /team/reject-member
        params:
          nodeId: { type: string, required: true, description: "申请者的 Node ID" }

      remove-member:
        description: "移除团队成员（仅 Owner）"
        method: POST
        path: /team/remove-member
        params:
          nodeId: { type: string, required: true, description: "要移除的成员 Node ID" }

  ai:
    description: "AI API Key 和预算管理"
    actions:
      add-member-key:
        description: "为成员创建 LiteLLM API Key"
        method: POST
        path: /ai/add-member
        params:
          nodeId: { type: string, required: true, description: "成员的 Node ID" }
          memberName: { type: string, description: "成员显示名称" }

      remove-member-key:
        description: "删除成员的 API Key（仅 Owner）"
        method: POST
        path: /ai/remove-member
        params:
          nodeId: { type: string, required: true, description: "要删除 Key 的成员 Node ID" }
          ownerNodeId: { type: string, required: true, description: "Owner 的 Node ID" }

      list-keys:
        description: "列出所有 AI API Key 及用量"
        method: POST
        path: /ai/keys
        params: {}

      usage:
        description: "查询 AI 用量（可按成员、日期过滤）"
        method: POST
        path: /ai/usage
        params:
          nodeId: { type: string, description: "查询特定成员的用量" }
          startDate: { type: string, description: "起始日期 (YYYY-MM-DD)" }
          endDate: { type: string, description: "结束日期 (YYYY-MM-DD)" }

      set-budget:
        description: "设置团队 AI 预算上限（仅 Owner）"
        method: POST
        path: /ai/budget
        params:
          maxBudget: { type: number, required: true, description: "预算上限（美元）" }
          ownerNodeId: { type: string, required: true, description: "Owner 的 Node ID" }
