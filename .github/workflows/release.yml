name: Release

on:
  push:
    tags:
      - "v*"

# Cancel in-progress release if a new tag is pushed
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pre-flight: verify OSS credentials and secrets before expensive builds
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Verify OSS access
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ vars.OSS_BUCKET }}
        run: |
          set -e
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          echo "preflight-$(date +%s)" > /tmp/oss-probe.txt
          ossutil cp /tmp/oss-probe.txt "oss://$OSS_BUCKET/teamclaw-pro/.preflight-probe" \
            -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force
          ossutil rm "oss://$OSS_BUCKET/teamclaw-pro/.preflight-probe" \
            -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force || true
          echo "✅ OSS write access verified"

      - name: Verify required secrets
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          BUILD_CONFIG: ${{ secrets.BUILD_CONFIG_PRODUCTION }}
        run: |
          MISSING=""
          [ -z "$TAURI_KEY" ] && MISSING="$MISSING TAURI_SIGNING_PRIVATE_KEY"
          [ -z "$BUILD_CONFIG" ] && MISSING="$MISSING BUILD_CONFIG_PRODUCTION"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present"

  # macOS job creates the GitHub Release and uploads macOS artifacts
  release-macos:
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            opencode_asset: opencode-darwin-arm64.zip
            opencode_binary: opencode-aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            opencode_asset: opencode-darwin-x64.zip
            opencode_binary: opencode-x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      # 1. Check out open-source TeamClaw (the "shell")
      - uses: actions/checkout@v4
        with:
          repository: different-ai-studio/teamclaw
          ref: feat/plugin-system

      # 2. Check out Pro build config from this repo
      - uses: actions/checkout@v4
        with:
          path: .pro-config
          sparse-checkout: |
            build.config.json

      # 3. Apply Pro build config overlay
      - name: Apply Pro build config
        run: cp .pro-config/build.config.json ./build.config.json

      - name: Write production build config from secret
        env:
          BUILD_CONFIG_PRODUCTION: ${{ secrets.BUILD_CONFIG_PRODUCTION }}
        run: |
          if [ -n "$BUILD_CONFIG_PRODUCTION" ]; then
            echo "$BUILD_CONFIG_PRODUCTION" > build.config.production.json
            echo "✅ Production build config written"
          else
            echo "⚠️ No BUILD_CONFIG_PRODUCTION secret set, using defaults"
          fi

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm install --no-save @tauri-apps/cli
          echo "test" > /tmp/test_sign_file
          npx @tauri-apps/cli signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" /tmp/test_sign_file
          echo "✅ Signing key verified successfully"
          rm -f /tmp/test_sign_file /tmp/test_sign_file.sig

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup SSH for plugin repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLUGIN_DEPLOY_KEY }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          key: ${{ matrix.target }}

      # 4. Install Pro plugin + build frontend + download opencode + import cert (parallel)
      - name: Build all (parallel)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          mkdir -p src-tauri/binaries

          # 1) Install Pro plugin → pnpm install → frontend build (sequential chain, backgrounded)
          (
            set -e
            pnpm add @teamclaw/plugin-team@"${{ secrets.PLUGIN_REPO_URL }}"
            pnpm install
            echo "pnpm install done, building frontend..."
            BUILD_ENV=production pnpm --filter @teamclaw/app build
            echo "frontend build done"
          ) > /tmp/frontend.log 2>&1 &
          PID_FRONTEND=$!

          # 2) Download opencode binary (background)
          (
            set -e
            OPENCODE_VERSION=$(gh release view --repo anomalyco/opencode --json tagName -q '.tagName')
            echo "Downloading opencode ${OPENCODE_VERSION}..."
            gh release download "$OPENCODE_VERSION" --repo anomalyco/opencode --pattern "${{ matrix.opencode_asset }}" --dir /tmp
            unzip -o /tmp/${{ matrix.opencode_asset }} -d /tmp/opencode-extract
            mv /tmp/opencode-extract/opencode src-tauri/binaries/${{ matrix.opencode_binary }}
            chmod +x src-tauri/binaries/${{ matrix.opencode_binary }}
            xattr -cr src-tauri/binaries/${{ matrix.opencode_binary }}
            codesign --force --sign - src-tauri/binaries/${{ matrix.opencode_binary }}
            echo "opencode ${OPENCODE_VERSION} ready"
          ) > /tmp/opencode.log 2>&1 &
          PID_OPENCODE=$!

          # 3) Import Apple certificate (background, fast but independent)
          (
            if [ -z "$APPLE_CERTIFICATE" ]; then
              echo "No certificate, using ad-hoc signing."
              exit 0
            fi
            set -e
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
            CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1)
            CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
            echo "Certificate imported: $CERT_ID"
          ) > /tmp/cert.log 2>&1 &
          PID_CERT=$!

          # Wait for all; dump logs on failure
          FAILED=0
          wait $PID_FRONTEND || { echo "::error::Frontend build failed:"; cat /tmp/frontend.log; FAILED=1; }
          wait $PID_OPENCODE || { echo "::error::opencode download failed:"; cat /tmp/opencode.log; FAILED=1; }
          wait $PID_CERT     || { echo "::error::Certificate import failed:"; cat /tmp/cert.log; FAILED=1; }

          if [ "$FAILED" -ne 0 ]; then exit 1; fi

          echo "All parallel tasks completed"
          ls -lh src-tauri/binaries/
          ls -lh packages/app/dist/ | head -5

      # Skip beforeBuildCommand since frontend is already built above
      - name: Skip frontend rebuild in tauri build
        run: |
          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              conf = json.load(f)
          conf['build']['beforeBuildCommand'] = 'echo frontend already built'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          "

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATER_GITHUB_TOKEN: ${{ secrets.UPDATER_GITHUB_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TeamClaw ${{ github.ref_name }}"
          releaseBody: |
            ## Installation

            ### macOS (one-line install)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/different-ai-studio/teamclaw/main/scripts/install-mac.sh | bash
            ```

            ### macOS (manual)
            1. Download the `.dmg` file below (choose `aarch64` for Apple Silicon, `x64` for Intel)
            2. Open the DMG and drag TeamClaw to Applications
            3. Before opening, run in Terminal:
               ```
               sudo xattr -dr com.apple.quarantine /Applications/Teamclaw.app
               ```
            4. Open TeamClaw from Applications

            > **Why is this needed?** TeamClaw is not yet notarized with Apple. macOS blocks unsigned apps downloaded from the internet. The command above removes this restriction.

            ### Windows
            Download and run the `.exe` installer below.
          releaseDraft: false
          prerelease: false
          # macOS: build with team + p2p features
          args: "--target ${{ matrix.target }} -- --features team,p2p"

      - name: Upload artifacts to Alibaba Cloud OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ vars.OSS_BUCKET }}
        run: |
          if ! command -v ossutil &>/dev/null; then
            curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          fi
          VERSION="${{ github.ref_name }}"
          ARTIFACTS_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          for f in "$ARTIFACTS_DIR"/dmg/*.dmg; do
            [ -f "$f" ] && ossutil cp "$f" "oss://$OSS_BUCKET/teamclaw-pro/releases/$VERSION/$(basename "$f")" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force
          done
          for f in "$ARTIFACTS_DIR"/macos/*.tar.gz; do
            [ -f "$f" ] && ossutil cp "$f" "oss://$OSS_BUCKET/teamclaw-pro/releases/$VERSION/$(basename "$f")" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force
          done
          for f in "$ARTIFACTS_DIR"/macos/*.tar.gz.sig; do
            [ -f "$f" ] && ossutil cp "$f" "oss://$OSS_BUCKET/teamclaw-pro/releases/$VERSION/$(basename "$f")" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force
          done

  # Windows job uploads artifacts to the same GitHub Release created by macOS job
  release-windows:
    needs: preflight
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: different-ai-studio/teamclaw
          ref: feat/plugin-system

      - uses: actions/checkout@v4
        with:
          path: .pro-config
          sparse-checkout: |
            build.config.json

      - name: Apply Pro build config
        shell: bash
        run: cp .pro-config/build.config.json ./build.config.json

      - name: Write production build config from secret
        env:
          BUILD_CONFIG_PRODUCTION: ${{ secrets.BUILD_CONFIG_PRODUCTION }}
        shell: bash
        run: |
          if [ -n "$BUILD_CONFIG_PRODUCTION" ]; then
            echo "$BUILD_CONFIG_PRODUCTION" > build.config.production.json
            echo "✅ Production build config written"
          else
            echo "⚠️ No BUILD_CONFIG_PRODUCTION secret set, using defaults"
          fi

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          npm install --no-save @tauri-apps/cli
          echo "test" > "$RUNNER_TEMP/test_sign_file"
          npx @tauri-apps/cli signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$RUNNER_TEMP/test_sign_file"
          echo "✅ Signing key verified successfully"
          rm -f "$RUNNER_TEMP/test_sign_file" "$RUNNER_TEMP/test_sign_file.sig"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup SSH for plugin repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLUGIN_DEPLOY_KEY }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/pnpm/store/v3
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install Pro plugin and build frontend
        env:
          BUILD_ENV: production
        run: |
          pnpm add @teamclaw/plugin-team@"${{ secrets.PLUGIN_REPO_URL }}"
          pnpm install
          pnpm --filter @teamclaw/app build

      - name: Download OpenCode binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          OPENCODE_VERSION=$(gh release view --repo anomalyco/opencode --json tagName -q '.tagName')
          echo "Downloading opencode ${OPENCODE_VERSION} for Windows..."
          gh release download "$OPENCODE_VERSION" --repo anomalyco/opencode --pattern "opencode-windows-x64.zip" --dir "$RUNNER_TEMP"
          unzip -o "$RUNNER_TEMP/opencode-windows-x64.zip" -d "$RUNNER_TEMP/opencode-extract"
          mv "$RUNNER_TEMP/opencode-extract/opencode.exe" src-tauri/binaries/opencode-x86_64-pc-windows-msvc.exe
          echo "opencode ${OPENCODE_VERSION} ready"
          ls -lh src-tauri/binaries/

      - name: Skip frontend rebuild in tauri build
        shell: python
        run: |
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              conf = json.load(f)
          conf['build']['beforeBuildCommand'] = 'echo frontend already built'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TeamClaw ${{ github.ref_name }}"
          releaseBody: |
            ## Installation

            ### macOS (one-line install)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/different-ai-studio/teamclaw/main/scripts/install-mac.sh | bash
            ```

            ### macOS (manual)
            1. Download the `.dmg` file below
            2. Open the DMG and drag TeamClaw to Applications
            3. Before opening, run in Terminal:
               ```
               sudo xattr -dr com.apple.quarantine /Applications/Teamclaw.app
               ```
            4. Open TeamClaw from Applications

            ### Windows
            Download and run the `.exe` installer below.
          releaseDraft: false
          prerelease: false
          # Windows: team feature only (no p2p to avoid wmi/windows-core conflicts)
          args: "--bundles nsis -- --features team"

      - name: Upload artifacts to Alibaba Cloud OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ vars.OSS_BUCKET }}
        shell: bash
        run: |
          if ! command -v ossutil &>/dev/null; then
            curl -fsSL -o /tmp/ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-windows-amd64.zip
            unzip -o /tmp/ossutil.zip -d /tmp/ossutil-extract
            cp /tmp/ossutil-extract/ossutil-v1.7.19-windows-amd64/ossutil64.exe /usr/bin/ossutil.exe || cp /tmp/ossutil-extract/ossutil-v1.7.19-windows-amd64/ossutil64.exe "$HOME/ossutil.exe"
            export PATH="$HOME:$PATH"
          fi
          VERSION="${{ github.ref_name }}"
          ARTIFACTS_DIR="src-tauri/target/release/bundle"

          for f in "$ARTIFACTS_DIR"/nsis/*.exe; do
            [ -f "$f" ] && ossutil cp "$f" "oss://$OSS_BUCKET/teamclaw-pro/releases/$VERSION/$(basename "$f")" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force
          done
          for f in "$ARTIFACTS_DIR"/nsis/*.nsis.zip; do
            [ -f "$f" ] && ossutil cp "$f" "oss://$OSS_BUCKET/teamclaw-pro/releases/$VERSION/$(basename "$f")" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force
          done
          for f in "$ARTIFACTS_DIR"/nsis/*.nsis.zip.sig; do
            [ -f "$f" ] && ossutil cp "$f" "oss://$OSS_BUCKET/teamclaw-pro/releases/$VERSION/$(basename "$f")" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force
          done

  # Generate Tauri updater JSON and upload to OSS
  upload-updater-json:
    needs: [release-macos, release-windows]
    if: always() && needs.release-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload updater JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ vars.OSS_BUCKET }}
        run: |
          if ! command -v ossutil &>/dev/null; then
            curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          fi

          VERSION="${{ github.ref_name }}"
          OSS_BASE="https://teamclaw.ucar.cc/teamclaw-pro/releases/$VERSION"
          NOTES="TeamClaw Pro $VERSION"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p /tmp/sigs
          gh release download "$VERSION" --pattern "*.sig" --dir /tmp/sigs || true

          MAC_AARCH64_SIG=""
          MAC_X64_SIG=""
          WIN_SIG=""
          for f in /tmp/sigs/*aarch64*tar.gz.sig; do [ -f "$f" ] && MAC_AARCH64_SIG=$(cat "$f"); done
          for f in /tmp/sigs/*x64*tar.gz.sig /tmp/sigs/*x86_64*tar.gz.sig; do [ -f "$f" ] && MAC_X64_SIG=$(cat "$f"); done
          for f in /tmp/sigs/*nsis.zip.sig; do [ -f "$f" ] && WIN_SIG=$(cat "$f"); done

          MAC_AARCH64_FILE=$(gh release view "$VERSION" --json assets -q '.assets[].name' | grep 'aarch64.*tar.gz$' | head -1)
          MAC_X64_FILE=$(gh release view "$VERSION" --json assets -q '.assets[].name' | grep -E '(x64|x86_64).*tar.gz$' | head -1)
          WIN_FILE=$(gh release view "$VERSION" --json assets -q '.assets[].name' | grep 'nsis.zip$' | head -1)

          cat > /tmp/latest.json <<ENDJSON
          {
            "version": "$VERSION",
            "notes": "$NOTES",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_AARCH64_SIG",
                "url": "$OSS_BASE/$MAC_AARCH64_FILE"
              },
              "darwin-x86_64": {
                "signature": "$MAC_X64_SIG",
                "url": "$OSS_BASE/$MAC_X64_FILE"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "$OSS_BASE/$WIN_FILE"
              }
            }
          }
          ENDJSON

          echo "Generated updater JSON:"
          cat /tmp/latest.json

          ossutil cp /tmp/latest.json "oss://$OSS_BUCKET/teamclaw-pro/update.json" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" --force
          echo "Updater JSON uploaded to OSS"
