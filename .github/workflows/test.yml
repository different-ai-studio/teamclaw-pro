name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      # Smoke/E2E use tauri-mcp and require a built Tauri app (pnpm tauri:build).
      # Run locally or in a job that builds the app to execute smoke/e2e.
      - name: Run smoke tests
        run: pnpm test:smoke
        continue-on-error: true
