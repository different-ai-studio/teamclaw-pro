name: Sync from upstream

on:
  schedule:
    - cron: '0 8 * * *'    # Daily at UTC 8:00
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/different-ai-studio/teamclaw.git
          git fetch upstream main

      - name: Attempt merge
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=conflict" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Push if clean merge
        if: steps.merge.outputs.status == 'clean'
        run: |
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            git push origin main
            echo "Auto-merged upstream changes"
          else
            echo "Already up to date"
          fi

      - name: Create PR if conflict
        if: steps.merge.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b $BRANCH
          git merge upstream/main --no-commit || true
          git add -A
          git commit -m "chore: sync upstream $(date +%Y-%m-%d) (conflicts)"
          git push origin $BRANCH
          gh pr create \
            --title "Sync upstream $(date +%Y-%m-%d)" \
            --body "$(cat <<'BODY'
          Auto-sync from upstream has merge conflicts that need manual resolution.

          **Files that typically differ between repos:**
          - `packages/app/src/plugins/index.ts`
          - `packages/app/src/plugins/team/`
          - `src-tauri/src/lib.rs`
          - `src-tauri/Cargo.toml`
          BODY
          )" \
            --base main --head $BRANCH
