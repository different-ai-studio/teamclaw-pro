name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build Check (open-source + Pro plugin)
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout open-source TeamClaw
      - uses: actions/checkout@v4
        with:
          repository: different-ai-studio/teamclaw
          ref: feat/plugin-system

      # 2. Checkout Pro build config
      - uses: actions/checkout@v4
        with:
          path: .pro-config
          sparse-checkout: |
            build.config.json

      - name: Apply Pro build config
        run: cp .pro-config/build.config.json ./build.config.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # 3. Configure git for private plugin repo access
      - name: Configure git for private plugin
        run: |
          git config --global url."https://x-access-token:${{ secrets.PAT }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies + Pro plugin
        run: |
          pnpm add @teamclaw/plugin-team@"${{ secrets.PLUGIN_REPO_URL }}"
          pnpm install

      - name: TypeScript check
        run: pnpm typecheck

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libglib2.0-dev patchelf libasound2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Create stub sidecar binary
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/opencode-x86_64-unknown-linux-gnu

      - name: Cargo check (with team + p2p features)
        run: cargo check --manifest-path src-tauri/Cargo.toml --features team,p2p
